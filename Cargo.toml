datadog-agent-config-testing = { path = "lib/datadog-agent/config-testing" }
datadog-protos = { path = "lib/protos/datadog" }
containerd-protos = { path = "lib/protos/containerd" }
ddsketch = { path = "lib/ddsketch" }
resource-accounting = { path = "lib/resource-accounting" }
process-memory = { path = "lib/process-memory" }
prometheus-exposition = { path = "lib/prometheus-exposition" }
saluki-api = { path = "lib/saluki-api" }
saluki-app = { path = "lib/saluki-app" }
saluki-common = { path = "lib/saluki-common" }
saluki-component-config = { path = "lib/saluki-component-config" }
saluki-components = { path = "lib/saluki-components" }
saluki-config-tools = { path = "lib/saluki-config-tools" }
saluki-context = { path = "lib/saluki-context" }
