[workspace]
members = [
  "bin/agent-data-plane",
  "bin/correctness/airlock",
  "bin/correctness/datadog-intake",
  "bin/correctness/millstone",
  "bin/correctness/panoramic",
  "bin/correctness/stele",
  "lib/agent-data-plane-config",
  "lib/agent-data-plane-config-system",
  "lib/datadog-agent/commons",
  "lib/datadog-agent/config",
  "lib/datadog-agent/config-overlay-model",
  "lib/datadog-agent/config-testing",
  "lib/ddsketch",
  "lib/ottl",
  "lib/process-memory",
  "lib/prometheus-exposition",
  "lib/protos/containerd",
  "lib/protos/datadog",
  "lib/protos/otlp",
  "lib/resource-accounting",
  "lib/saluki-api",
  "lib/saluki-app",
  "lib/saluki-common",
  "lib/saluki-component-config",
  "lib/saluki-components",
  "lib/saluki-config-tools",
  "lib/saluki-context",
  "lib/saluki-core",
  "lib/saluki-env",
  "lib/saluki-error",
  "lib/saluki-io",
  "lib/saluki-metadata",
  "lib/saluki-metrics",
  "lib/saluki-tls",
  "lib/stringtheory",
  "test/antithesis/harness",
  "test/architecture",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/DataDog/saluki"

[workspace.dependencies]
agent-data-plane-config = { path = "lib/agent-data-plane-config" }
agent-data-plane-config-system = { path = "lib/agent-data-plane-config-system" }
