  min_tls_version:
    support: partial
    warn: true
    pipelines: [cross_cutting]
    description: "Minimum TLS version for HTTPS connections"
    documentation: |
      ADP supports `min_tls_version` for Datadog intake forwarding through the shared Datadog
      forwarder. The default is `tlsv1.2`, which allows TLS 1.2 and TLS 1.3. To require TLS
      1.3 only, set `min_tls_version: tlsv1.3` or `DD_MIN_TLS_VERSION=tlsv1.3`.

      The core agent also accepts `tlsv1.0` and `tlsv1.1`. ADP accepts those values for
      configuration compatibility, but clamps them to TLS 1.2 because ADP uses `rustls`, which
      does not support TLS 1.0 or TLS 1.1.

      This setting does not affect ADP IPC, local privileged APIs, ADP control-plane clients,
      OTLP proxying to the core agent, or unrelated HTTP clients.
    test_support:
      used_by: [ForwarderConfiguration]
      env_var_override: [DD_MIN_TLS_VERSION]
      additional_attributes:
        config_registry_filename: forwarder.rs

