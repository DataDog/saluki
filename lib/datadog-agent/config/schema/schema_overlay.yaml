    pipelines: [ cross_cutting ]
    description: "Metric name allowlist for MRF forwarding"
    env_var_override: [ DD_MULTI_REGION_FAILOVER_METRIC_ALLOWLIST ]
    value_type_override: string_list
    additional_attributes:
