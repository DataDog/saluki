    description: "Use RFC 3339 timestamps in log output"
    test_support:
      used_by: [get_typed]
      additional_attributes:
        config_registry_filename: get_typed.rs

  log_level:
    support: partial
    pipelines: [cross_cutting]
    description: "Log verbosity directives"
    documentation: |
      ADP accepts `log_level` as the startup logging control. A plain level applies to
      ADP-owned and Saluki-owned targets only, including `agent_data_plane`, `saluki_*`, and
      runtime crates under `lib/`.

      ```yaml
      log_level: debug
      ```

      This keeps third-party dependencies such as `hyper`, `tokio`, and `tonic` at their
      default filtering unless you opt them in.

      To control dependency logs or set a global fallback, use advanced `EnvFilter` directives
      in `log_level`. ADP applies those directive strings as configured:

      ```yaml
      log_level: warn,agent_data_plane=debug,hyper=warn
      ```
    test_support:
      used_by: [get_typed]
      additional_attributes:
        config_registry_filename: get_typed.rs

  log_payloads:
    support: full
    pipelines: [checks, dogstatsd, traces]
    description: "Debug-log decoded payload contents before encoding"
    documentation: |
      Set `log_payloads: true` and run with debug-level logging to see decoded payload objects
      (scalar series metrics, sketches/distributions, events, and service checks) before they
      enter Datadog encoders. These logs can contain high-volume customer data including metric
      names, tags, host and container metadata, event text, and service check messages. Use this
      setting only while diagnosing payload content.

      ADP does not dump the exact encoded JSON or protobuf HTTP request body, and it does not
      log compressed wire payload bytes.
    test_support:
      used_by: [DatadogEventsConfiguration, DatadogMetricsConfiguration, DatadogServiceChecksConfiguration]
      additional_attributes:
        config_registry_filename: encoders.rs

  logging_frequency:
    support: none
    severity: low
    planned: false
    pipelines: [cross_cutting]
    description: "Transaction success log interval"
    documentation: "The core agent uses `logging_frequency` to throttle repetitive successful transaction logs. ADP logs successful forwarder operations below the default `info` level, so there is no matching info-level success-log stream to throttle. This key is intentionally unused."

  metric_filterlist:
    support: full
    pipelines: [dogstatsd]
    description: "Metric name blocklist"
    test_support:
      used_by: [DogStatsDPrefixFilterConfiguration]
      additional_attributes:
