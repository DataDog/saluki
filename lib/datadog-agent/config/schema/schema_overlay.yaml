    used_by: [ get_typed ]
    pipelines: [ cross_cutting ]
    description: "Use RFC 3339 timestamps in log output"
    additional_attributes:
      config_registry_filename: get_typed.rs

  log_level:
    support_level: partial
    used_by: [ get_typed ]
    pipelines: [ cross_cutting ]
    description: "Log verbosity directives"
    documentation: |-
      ADP accepts `log_level` as the startup logging control. A plain level applies to
      ADP-owned and Saluki-owned targets only, including `agent_data_plane`, `saluki_*`, and
      runtime crates under `lib/`.

      ```yaml
      log_level: debug
      ```

      This keeps third-party dependencies such as `hyper`, `tokio`, and `tonic` at their
      default filtering unless you opt them in.

      To control dependency logs or set a global fallback, use advanced `EnvFilter` directives
      in `log_level`. ADP applies those directive strings as configured:

      ```yaml
      log_level: warn,agent_data_plane=debug,hyper=warn
      ```
    additional_attributes:
      config_registry_filename: get_typed.rs

  log_payloads:
    support_level: full
    used_by: [ DatadogEventsConfiguration, DatadogMetricsConfiguration, DatadogServiceChecksConfiguration ]
    pipelines: [ checks, dogstatsd, traces ]
    description: "Debug-log decoded payload contents before encoding"
    documentation: |-
      Set `log_payloads: true` and run with debug-level logging to see decoded payload objects
      (scalar series metrics, sketches/distributions, events, and service checks) before they
      enter Datadog encoders. These logs can contain high-volume customer data including metric
      names, tags, host and container metadata, event text, and service check messages. Use this
      setting only while diagnosing payload content.

      ADP does not dump the exact encoded JSON or protobuf HTTP request body, and it does not
      log compressed wire payload bytes.
    additional_attributes:
      config_registry_filename: encoders.rs

  metric_filterlist:
    support_level: full
    used_by: [ DogStatsDPrefixFilterConfiguration ]
    pipelines: [ dogstatsd ]
    description: "Metric name blocklist"
    additional_attributes:
      config_registry_filename: dogstatsd_prefix_filter.rs

  metric_filterlist_match_prefix:
    support_level: full
    used_by: [ DogStatsDPrefixFilterConfiguration ]
    pipelines: [ dogstatsd ]
    description: "Blocklist uses prefix matching"
    additional_attributes:
      config_registry_filename: dogstatsd_prefix_filter.rs

  min_tls_version:
    support_level: partial
    used_by: [ ForwarderConfiguration ]
    pipelines: [ cross_cutting ]
    description: "Minimum TLS version for HTTPS connections"
    documentation: |-
      ADP supports `min_tls_version` for Datadog intake forwarding through the shared Datadog
      forwarder. The default is `tlsv1.2`, which allows TLS 1.2 and TLS 1.3. To require TLS
      1.3 only, set `min_tls_version: tlsv1.3` or `DD_MIN_TLS_VERSION=tlsv1.3`.

      The core agent also accepts `tlsv1.0` and `tlsv1.1`. ADP accepts those values for
      configuration compatibility, but clamps them to TLS 1.2 because ADP uses `rustls`, which
      does not support TLS 1.0 or TLS 1.1.

      This setting does not affect ADP IPC, local privileged APIs, ADP control-plane clients,
      OTLP proxying to the core agent, or unrelated HTTP clients.
    env_var_override: [ DD_MIN_TLS_VERSION ]
    additional_attributes:
      config_registry_filename: forwarder.rs

  multi_region_failover.api_key:
    support_level: full
    used_by: [ MrfConfiguration ]
    pipelines: [ cross_cutting ]
    description: "API key for the failover-region endpoint"
    env_var_override: [ DD_MULTI_REGION_FAILOVER_API_KEY ]
    value_type_override: string
    additional_attributes:
      config_registry_filename: mrf.rs

  multi_region_failover.dd_url:
    support_level: full
    used_by: [ MrfConfiguration ]
    pipelines: [ cross_cutting ]
    description: "Failover intake URL"
    env_var_override: [ DD_MULTI_REGION_FAILOVER_DD_URL ]
    value_type_override: string
    additional_attributes:
      config_registry_filename: mrf.rs

  multi_region_failover.enabled:
    support_level: partial
    used_by: [ MrfConfiguration ]
    pipelines: [ cross_cutting ]
    description: "Enable multi-region failover mode"
    documentation: |-
      ADP supports multi-region failover for metrics. When `multi_region_failover.enabled` and
      `multi_region_failover.failover_metrics` are both `true`, ADP forwards metrics to the
      primary Datadog endpoint and to a second MRF endpoint.

      To enable the MRF metrics branch at startup, configure `multi_region_failover.api_key`
      and one of `multi_region_failover.site` or `multi_region_failover.dd_url`. If the MRF
      endpoint configuration is incomplete, ADP skips the MRF branch and continues forwarding
      to the primary endpoint.

      ADP does not fall back to the primary `api_key`, `site`, or `dd_url` for MRF traffic.
      `multi_region_failover.enabled` and endpoint selection are resolved at startup.
      `multi_region_failover.failover_metrics`, `multi_region_failover.metric_allowlist`, and
      `multi_region_failover.api_key` can refresh from live configuration after the MRF branch
      is enabled.

      | Config Key                               | Behavior                                                                   | Default |
      | ---------------------------------------- | -------------------------------------------------------------------------- | ------- |
      | `multi_region_failover.enabled`          | Enables multi-region failover mode.                                        | `false` |
      | `multi_region_failover.failover_metrics` | Enables metrics forwarding to the failover region when MRF is enabled.     | `false` |
      | `multi_region_failover.metric_allowlist` | Exact metric names to forward to MRF. Empty or unset forwards all metrics. | `[]`    |
      | `multi_region_failover.api_key`          | API key for the failover-region endpoint.                                  | unset   |
      | `multi_region_failover.site`             | Datadog site for the failover region, used as `https://app.mrf.<site>`.    | unset   |
      | `multi_region_failover.dd_url`           | Explicit failover intake URL. Takes precedence over `site` when set.       | unset   |
    env_var_override: [ DD_MULTI_REGION_FAILOVER_ENABLED ]
    additional_attributes:
      config_registry_filename: mrf.rs

  multi_region_failover.failover_metrics:
    support_level: full
    used_by: [ MrfConfiguration ]
    pipelines: [ cross_cutting ]
    description: "Enable metrics forwarding to failover region"
    env_var_override: [ DD_MULTI_REGION_FAILOVER_FAILOVER_METRICS ]
    additional_attributes:
      config_registry_filename: mrf.rs

  multi_region_failover.metric_allowlist:
