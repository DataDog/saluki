  skip_ssl_validation:
    support_level: partial
    used_by: [ ForwarderConfiguration ]
    pipelines: [ cross_cutting ]
    description: "Skip TLS cert validation"
    documentation: |-
      ADP supports `skip_ssl_validation` for Datadog intake forwarding through the shared
      Datadog forwarder. The default is `false`, which preserves normal server certificate
      validation. When enabled, this setting affects the Datadog intake clients used by metrics,
      logs, traces, events, and service checks that flow through the shared forwarder.

      This setting does not affect ADP IPC, local privileged APIs, ADP control-plane clients,
      OTLP proxying to the core agent, or unrelated HTTP clients. In FIPS builds, ADP rejects
      `skip_ssl_validation: true` because disabling TLS certificate validation is not
      FIPS-compliant.
    env_var_override: [ DD_SKIP_SSL_VALIDATION ]
    additional_attributes:
      config_registry_filename: forwarder.rs

  statsd_forward_host:
    support_level: partial
    used_by: [ DogStatsDConfiguration ]
    pipelines: [ dogstatsd ]
    description: "UDP packet forwarding destination host"
    documentation: |-
      ADP supports DogStatsD forwarding when both `statsd_forward_host` and
      `statsd_forward_port` are set. ADP forwards each framed DogStatsD message over UDP to the
      configured destination before parsing, filtering, mapping, or aggregation. Forwarding
      does not preserve the core Agent's packet-buffer grouping, so forwarded UDP datagrams may
      be split differently while carrying the same DogStatsD messages. ADP logs setup failures
      and tracks send failures through telemetry.
    test_json: '"127.0.0.1"'
    additional_attributes:
      config_registry_filename: dogstatsd.rs

