      env_var_override: [DD_MULTI_REGION_FAILOVER_DD_URL]
      value_type_override: string
      additional_attributes:
        config_registry_filename: mrf.rs

  multi_region_failover.enabled:
    support: partial
    pipelines: [cross_cutting]
    description: "Enable multi-region failover mode"
    documentation: |
      ADP supports multi-region failover for metrics. When `multi_region_failover.enabled` and
      `multi_region_failover.failover_metrics` are both `true`, ADP forwards metrics to the
      primary Datadog endpoint and to a second MRF endpoint.

      To enable the MRF metrics branch at startup, configure `multi_region_failover.api_key`
      and one of `multi_region_failover.site` or `multi_region_failover.dd_url`. If the MRF
      endpoint configuration is incomplete, ADP skips the MRF branch and continues forwarding
      to the primary endpoint.

      ADP does not fall back to the primary `api_key`, `site`, or `dd_url` for MRF traffic.
      `multi_region_failover.enabled` and endpoint selection are resolved at startup.
      `multi_region_failover.failover_metrics`, `multi_region_failover.metric_allowlist`, and
      `multi_region_failover.api_key` can refresh from live configuration after the MRF branch
      is enabled.

      | Config Key                               | Behavior                                                                   | Default |
      | ---------------------------------------- | -------------------------------------------------------------------------- | ------- |
      | `multi_region_failover.enabled`          | Enables multi-region failover mode.                                        | `false` |
      | `multi_region_failover.failover_metrics` | Enables metrics forwarding to the failover region when MRF is enabled.     | `false` |
      | `multi_region_failover.metric_allowlist` | Exact metric names to forward to MRF. Empty or unset forwards all metrics. | `[]`    |
      | `multi_region_failover.api_key`          | API key for the failover-region endpoint.                                  | unset   |
      | `multi_region_failover.site`             | Datadog site for the failover region, used as `https://app.mrf.<site>`.    | unset   |
      | `multi_region_failover.dd_url`           | Explicit failover intake URL. Takes precedence over `site` when set.       | unset   |
    test_support:
      used_by: [MrfConfiguration]
      env_var_override: [DD_MULTI_REGION_FAILOVER_ENABLED]
      additional_attributes:
        config_registry_filename: mrf.rs

  multi_region_failover.failover_metrics:
    support: full
    pipelines: [cross_cutting]
    description: "Enable metrics forwarding to failover region"
    test_support:
      used_by: [MrfConfiguration]
      env_var_override: [DD_MULTI_REGION_FAILOVER_FAILOVER_METRICS]
      additional_attributes:
        config_registry_filename: mrf.rs

  multi_region_failover.metric_allowlist:
