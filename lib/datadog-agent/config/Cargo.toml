[package]
name = "datadog-agent-config"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[dependencies]
# TODO: remove after migration to typed config. `figment` is pulled in only for `DatadogRemapper`
# (a figment provider) and the legacy flat-key loader path in `remapper`; the typed model needs no
# figment.
figment = { workspace = true }
go-duration = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[build-dependencies]
datadog-agent-config-overlay-model = { workspace = true }
go-duration = { workspace = true }
indexmap = { workspace = true }
prettyplease = { workspace = true, features = ["verbatim"] }
schemars = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
syn = { workspace = true }
typify = { workspace = true }

[lints]
workspace = true
