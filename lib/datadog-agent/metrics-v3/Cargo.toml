[package]
name = "datadog-agent-metrics-v3"
version = "0.1.0"
description = "V3 columnar protobuf codec for Datadog metrics"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[dependencies]
# Not inherited from the workspace: the workspace default enables foldhash's "std" feature, which
# would pull `std` back into this otherwise `no_std` crate.
foldhash = { version = "0.2", default-features = false }
hashbrown = { workspace = true }
