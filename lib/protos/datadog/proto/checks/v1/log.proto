syntax = "proto3";

package datadog.checks.v1.log;

enum LogLevel {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_TRACE = 7;
    LOG_LEVEL_DEBUG = 10;
    LOG_LEVEL_INFO = 20;
    LOG_LEVEL_WARNING = 30;
    LOG_LEVEL_ERROR = 40;
    LOG_LEVEL_CRITICAL = 50;
}

message Log {
    string message = 1;
    LogLevel level = 2;
}
