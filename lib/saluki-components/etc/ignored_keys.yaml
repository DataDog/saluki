# This is a list of configuration keys appearing in core_schema.yaml that ADP has consciously
# decided to ignore. This file is NOT generated by a deterministic build script. Each key must be
# considered with a human-in the loop before being added here.
#
# BE CAREFUL: adding a key here means that ADP will not issue a warning or error when the key exists
# in configuration, even if it is unsupported by ADP. Only those keys which are expected to have no
# effect on ADP behavior (by design) should be listed here.
#
# Reason "initial bulk" refers to the initial population of this file using the results of a
# human-guided AI analysis which resulted in PR #1437. Since then, a few keys deemed ignorable by
# that audit have bubbled up and been proven significant, whether because they are new or because
# they were missed. Overall though, the results of that audit have proven fairly durable.
