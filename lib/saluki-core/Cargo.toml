[package]
name = "saluki-core"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
loom = ["dep:loom"]

[dependencies]
anymap3 = { workspace = true }
async-trait = { workspace = true }
bitmask-enum = { workspace = true }
ddsketch = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
indexmap = { workspace = true, features = ["std"] }
loom = { workspace = true, optional = true }
metrics = { workspace = true }
metrics-util = { workspace = true, features = ["recency", "registry"] }
ordered-float = { workspace = true }
papaya = { workspace = true }
pastey = { workspace = true }
pin-project = { workspace = true }
prometheus-exposition = { workspace = true }
resource-accounting = { workspace = true }
saluki-antithesis = { workspace = true }
saluki-api = { workspace = true }
saluki-common = { workspace = true }
saluki-context = { workspace = true }
saluki-error = { workspace = true }
saluki-metrics = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
smallvec = { workspace = true }
snafu = { workspace = true }
stringtheory = { workspace = true }
tokio = { workspace = true, features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "sync",
  "time",
] }
tokio-util = { workspace = true, features = ["time"] }
tracing = { workspace = true, features = ["std"] }

[dev-dependencies]
metrics-util = { workspace = true, features = ["debugging"] }
proptest = { workspace = true }
tokio-test = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["ansi", "fmt"] }
