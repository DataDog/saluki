[package]
name = "saluki-tls"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
default = []
fips = ["aws-lc-rs/fips", "rustls-cng-crypto/fips"]

[dependencies]
rustls = { workspace = true, features = ["std"] }
rustls-native-certs = { workspace = true }
saluki-common = { workspace = true }
saluki-error = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(windows))'.dependencies]
aws-lc-rs = { workspace = true, optional = true }
rustls = { workspace = true, features = ["aws_lc_rs"] }

[target.'cfg(windows)'.dependencies]
rustls-cng-crypto = { workspace = true }

[dev-dependencies]
rcgen = { workspace = true, features = ["crypto", "pem"] }
tempfile = { workspace = true }

[target.'cfg(not(windows))'.dev-dependencies]
rcgen = { workspace = true, features = ["aws_lc_rs"] }

[target.'cfg(windows)'.dev-dependencies]
rcgen = { workspace = true, features = ["ring"] }
