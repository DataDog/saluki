[package]
name = "saluki-tls"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
default = []
# FIPS for non-Windows builds: AWS-LC in FIPS mode. (Windows uses `fips-cng`.)
fips = ["_fips", "rustls/fips"]
# FIPS for Windows builds: the OS-native CNG provider in FIPS mode. Never enable on non-Windows;
# `rustls-cng-crypto` is a Windows-only dependency, so activating this elsewhere is an error.
fips-cng = ["_fips", "rustls-cng-crypto/fips"]
# Private marker enabled by both FIPS features. Gates FIPS-specific behavior (key-log suppression,
# Extended Master Secret, and the `config.fips()` compliance check) independent of the active provider.
_fips = []

[dependencies]
rustls = { workspace = true, features = ["std"] }
rustls-native-certs = { workspace = true }
saluki-common = { workspace = true }
saluki-error = { workspace = true }
tracing = { workspace = true }

# The crypto provider is selected by target. Only this crate installs the process-wide default provider,
# so only it needs a concrete provider: AWS-LC everywhere except Windows, which uses the OS-native CNG.
[target.'cfg(not(windows))'.dependencies]
rustls = { workspace = true, features = ["aws_lc_rs"] }

[target.'cfg(windows)'.dependencies]
rustls-cng-crypto = { workspace = true }

[dev-dependencies]
rcgen = { workspace = true, features = ["crypto", "ring", "pem"] }
tempfile = { workspace = true }
