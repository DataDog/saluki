[package]
name = "saluki-tls"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
default = []
fips = ["aws-lc-rs/fips", "rustls-cng-crypto/fips", "rustls-webpki/aws-lc-rs-fips"]
test-util = ["dep:rcgen"]

[dependencies]
rcgen = { workspace = true, features = ["crypto", "pem"], optional = true }
rustls = { workspace = true, features = ["std"] }
rustls-native-certs = { workspace = true }
saluki-common = { workspace = true }
saluki-error = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(windows))'.dependencies]
aws-lc-rs = { workspace = true, optional = true }
rcgen = { workspace = true, features = ["aws_lc_rs"], optional = true }
rustls = { workspace = true, features = ["aws_lc_rs"] }
rustls-webpki = { workspace = true, optional = true }

[target.'cfg(windows)'.dependencies]
rcgen = { workspace = true, features = ["ring"], optional = true }
rustls-cng-crypto = { workspace = true }

[dev-dependencies]
saluki-tls = { path = ".", features = ["test-util"] }
tempfile = { workspace = true }
