[package]
name = "saluki-io-fuzz"
version = "0.0.0"
publish = false
edition = "2021"
rust-version = "1.94"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
saluki-io = { path = ".." }

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "dogstatsd_decode_packet"
path = "fuzz_targets/dogstatsd_decode_packet.rs"
test = false
doc = false
bench = false
