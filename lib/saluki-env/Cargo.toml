[package]
name = "saluki-env"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
# Exposes in-memory test doubles (e.g. `TestWorkloadProvider`) for downstream crates to use as a dev-dependency.
test-util = []

[dependencies]
arc-swap = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
bitmask-enum = { workspace = true }
containerd-protos = { workspace = true }
datadog-protos = { workspace = true }
fnv = { workspace = true }
futures = { workspace = true }
hyper-util = { workspace = true }
prost = { workspace = true }
regex = { workspace = true, features = ["std", "perf"] }
saluki-common = { workspace = true }
saluki-config = { workspace = true }
saluki-context = { workspace = true }
saluki-core = { workspace = true }
saluki-error = { workspace = true }
saluki-metrics = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
snafu = { workspace = true }
socket2 = { workspace = true }
stringtheory = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros", "sync"] }
tonic = { workspace = true, features = ["channel"] }
tower = { workspace = true, features = ["util"] }
tracing = { workspace = true }
twox-hash = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
saluki-config = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
