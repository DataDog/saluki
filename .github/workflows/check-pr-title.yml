# This is a GitHub Action that ensures that the PR titles match the Conventional Commits spec.
# See: https://www.conventionalcommits.org/en/v1.0.0/

name: "Semantic PR Title Check"

on:
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  main:
    permissions:
      id-token: write
    name: Check For Semantic PR Title
    runs-on: ubuntu-24.04
    steps:
      - name: Get access token from dd-octo-sts
        uses: DataDog/dd-octo-sts-action@acaa02eee7e3bb0839e4272dacb37b8f3b58ba80 # v1.0.3
        id: octo-sts
        with:
          scope: DataDog/saluki
          policy: self.check-pr-title

      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
        with:
          requireScope: true
          types: |
            chore
            enhancement
            feat
            fix
            docs
            revert

          scopes: |
            agent-data-plane
            aggregate
            airlock
            api
            apm stats
            app
            blackhole
            buffered incremental
            chained
            ci
            common
            components
            config
            containerd-protos
            context
            core
            datadog
            datadog-intake
            datadog-protos
            ddsketch
            deps
            dev
            docs
            dogstatsd
            dogstatsd mapper
            dogstatsd prefix filter
            dsd stats
            env
            error
            health
            heartbeat
            host enrichment
            host tags
            internal metrics
            io
            memory-accounting
            metadata
            metric router
            metrics
            millstone
            otlp
            otlp-protos
            ottl
            panoramic
            process-memory
            prometheus
            prometheus-exposition
            stele
            stringtheory
            tls
            trace obfuscation
            trace sampler
