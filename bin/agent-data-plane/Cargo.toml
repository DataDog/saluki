[package]
name = "agent-data-plane"
version = "0.1.35"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
default = []
fips = ["saluki-app/tls-fips"]
# `fuzzing` enables both the libfuzzer harness and the deterministic in-process integration
# test (`integration_small_test`). The integration test pulls in axum + hyper's server features
# to run the in-memory intake; production builds never see those dependencies.
fuzzing = [
  "dep:libfuzzer-sys",
  "dep:arbitrary",
  "dep:barkus-core",
  "dep:barkus-ebnf",
  "dep:rand",
  "dep:memchr",
  "dep:datadog-intake",
  "dep:tempfile",
  "dep:axum",
  "dep:hyper-util",
  "hyper/server",
  "hyper/http1"
]

[dependencies]
argh = { workspace = true, features = ["help"] }
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
colored = { workspace = true }
comfy-table = { workspace = true }
datadog-protos = { workspace = true }
foldhash = { workspace = true }
futures = { workspace = true }
hashbrown = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
# Only used by the in-process integration test (see `fuzz.rs`).
axum = { workspace = true, optional = true, features = ["http1", "json", "tokio"] }
hyper-util = { workspace = true, optional = true, features = ["tokio", "service"] }
memory-accounting = { workspace = true }
metrics = { workspace = true }
ottl = { workspace = true }
papaya = { workspace = true }
prometheus-exposition = { workspace = true }
prost-types = { workspace = true }
rand = { version = "0.10", optional = true }
barkus-core = { path = "../../../barkus/crates/barkus-core", optional = true }
barkus-ebnf = { path = "../../../barkus/crates/barkus-ebnf", optional = true }
datadog-intake = { path = "../../bin/correctness/datadog-intake", optional = true }
saluki-api = { workspace = true }
saluki-app = { workspace = true }
saluki-common = { workspace = true }
saluki-components = { workspace = true }
saluki-config = { workspace = true }
saluki-context = { workspace = true }
saluki-core = { workspace = true }
saluki-env = { workspace = true }
saluki-error = { workspace = true }
saluki-io = { workspace = true }
saluki-metadata = { workspace = true }
saluki-metrics = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
stringtheory = { workspace = true }
tokio = { workspace = true, features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "signal",
  "full",
  "tracing", # tokio_console instrumentation
  "test-util", # for start_paused
] }
tonic = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
libfuzzer-sys = { version = "0.4.12", optional = true }
arbitrary = { version = "1.4.2", optional = true }
memchr = { workspace = true, optional = true }
console-subscriber = "0.5.0" # tokio_console instrumentation
tempfile = { workspace = true, optional = true }
tracing-subscriber.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
tikv-jemallocator = { workspace = true, features = [
  "background_threads",
  "unprefixed_malloc_on_supported_platforms",
  "stats",
] }

[build-dependencies]
chrono = { workspace = true }

[dev-dependencies]
saluki-metrics = { workspace = true, features = ["test"] }

[lib]
path = "src/lib.rs"

[[bin]]
name = "agent_data_plane"
path = "src/main.rs"

[[bin]]
name = "integration_small_test"
path = "src/integration_small_test.rs"
required-features = ["fuzzing"]


