[package]
name = "agent-data-plane"
version = "1.5.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[features]
default = []
fips = ["saluki-app/tls-fips", "saluki-components/fips"]
antithesis = ["saluki-antithesis/antithesis", "dep:antithesis-instrumentation"]

[dependencies]
agent-data-plane-config = { workspace = true }
agent-data-plane-config-system = { workspace = true }
antithesis-instrumentation = { workspace = true, optional = true }
arc-swap = { workspace = true }
argh = { workspace = true, features = ["help"] }
async-trait = { workspace = true }
bytesize = { workspace = true }
chrono = { workspace = true }
colored = { workspace = true }
comfy-table = { workspace = true }
datadog-agent-commons = { workspace = true }
datadog-agent-config = { workspace = true }
datadog-protos = { workspace = true }
foldhash = { workspace = true }
futures = { workspace = true }
getrandom = { workspace = true }
hashbrown = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
metrics = { workspace = true }
ottl = { workspace = true }
process-memory = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
saluki-antithesis = { workspace = true }
saluki-api = { workspace = true }
saluki-app = { workspace = true }
saluki-common = { workspace = true }
saluki-components = { workspace = true }
saluki-config = { workspace = true }
saluki-context = { workspace = true }
saluki-core = { workspace = true }
saluki-env = { workspace = true }
saluki-error = { workspace = true }
saluki-io = { workspace = true }
saluki-metadata = { workspace = true }
saluki-metrics = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
stringtheory = { workspace = true }
subtle = { workspace = true }
tokio = { workspace = true, features = [
  "macros",
  "net",
  "rt",
  "rt-multi-thread",
  "signal",
  "time",
] }
tokio-util = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
zstd = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
tokio = { workspace = true, features = ["taskdump"] }
tikv-jemallocator = { workspace = true, features = [
  "background_threads",
  "unprefixed_malloc_on_supported_platforms",
  "stats",
] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { workspace = true, features = [
  "Win32_Foundation",
  "Win32_Storage_FileSystem",
] }

[build-dependencies]
chrono = { workspace = true }

[dev-dependencies]
datadog-agent-config-testing = { workspace = true }
derive-where = { workspace = true }
saluki-components = { workspace = true, features = ["test-util"] }
saluki-config = { workspace = true, features = ["test-util"] }
saluki-core = { workspace = true, features = ["test-util"] }
saluki-metrics = { workspace = true, features = ["test"] }
tempfile = { workspace = true }
tower = { workspace = true, features = ["util"] }
