[package]
name = "intake-collector"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Internal dependencies.
datadog-protos = { workspace = true }
ddsketch-agent = { workspace = true }
intake-data-store = { workspace = true }

# External dependencies.
axum = { version = "0.7.5" }
protobuf = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread"] }
tower-http = { version = "0.5.2", default-features = false, features = ["compression-zstd", "decompression-deflate", "decompression-zstd"]}
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt"] }
