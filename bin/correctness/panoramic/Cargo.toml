[package]
name = "panoramic"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[dependencies]
airlock = { path = "../airlock" }
argh = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bollard = { workspace = true, features = ["time"] }
chrono = { workspace = true }
colored = { workspace = true }
crossterm = { workspace = true, features = ["events", "windows"] }
futures = { workspace = true }
k8s-openapi = { workspace = true }
kube = { workspace = true, features = ["client", "http-proxy", "rustls-tls", "ws"] }
rand = { workspace = true, features = ["std", "std_rng", "thread_rng"] }
rand_distr = { workspace = true }
regex = { workspace = true, features = ["std"] }
reqwest = { workspace = true, features = ["json", "zstd", "rustls", "query"] }
rustls = { workspace = true }
saluki-common = { workspace = true }
saluki-config-tools = { workspace = true }
saluki-error = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
stele = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "net", "process", "rt", "rt-multi-thread", "signal", "sync", "time"] }
tokio-util = { workspace = true, features = ["compat"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = [
  "ansi",
  "env-filter",
  "fmt",
  "local-time",
  "registry",
  "std",
  "tracing-log",
] }
treediff = { workspace = true, features = ["with-serde-json"] }
