name: "health-endpoints"
description: "Verifies the /ready and /live health endpoints are accessible on the unprivileged API"
timeout: 60s

container:
  image: "saluki-images/datadog-agent:testing-devel"
  env:
    DD_API_KEY: "test-api-key"
    DD_HOSTNAME: "integration-test-health"
    DD_DATA_PLANE_ENABLED: "true"
    DD_DATA_PLANE_STANDALONE_MODE: "true"
    DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
  exposed_ports:
    - "5100/tcp"

assertions:
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: health_check
        endpoint: "http://localhost:5100/ready"
        expected_status: 200
        timeout: 10s
      - type: health_check
        endpoint: "http://localhost:5100/live"
        expected_status: 200
        timeout: 10s
      - type: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
