type: integration
name: "adp-logging-mac-ignores-core-agent-log-file"
description: "Verifies ADP ignores the Core Agent's `log_file` setting on the macOS host-process runtime"
timeout: 120s
runtimes: [mac]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-mac-ignore-core-log-file"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_USE_NEW_CONFIG_STREAM_ENDPOINT: "true"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
  DD_LOG_FILE: "/tmp/coreagent-only-mac.log"
  DD_DATA_PLANE_LOG_FILE: "/tmp/adp-mac-ignores-core-agent-log-file.log"

container:
  exposed_ports:
    - "58125/udp"

procedure:
  - assertion: log_contains
    pattern: "Initial configuration received."
    timeout: 30s
  - assertion: file_contains
    path: "/tmp/coreagent-only-mac.log"
    pattern: "CORE"
    timeout: 30s
  - assertion: file_contains
    path: "/tmp/adp-mac-ignores-core-agent-log-file.log"
    pattern: "DATAPLANE"
    timeout: 30s
