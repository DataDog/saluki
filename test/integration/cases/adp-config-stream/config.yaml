type: integration
name: "adp-config-stream"
description: "Verify ADP receives configuration from Core Agent via config stream"
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-configstream"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "false"
  DD_DATA_PLANE_USE_NEW_CONFIG_STREAM_ENDPOINT: "true"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"

container:
  exposed_ports:
    - "58125/udp"

procedure:
  # Make sure we initially see ADP try to reach out to the Core Agent for its configuration.
  - assertion: log_contains
    pattern: "Waiting for initial configuration from Datadog Agent"
    timeout: 60s
  # Make sure the process becomes healthy, and stays up without errors, for ~10 seconds after.
  - parallel:
      - assertion: process_stable_for
        duration: 10s
      - assertion: log_contains
        pattern: "Topology healthy"
        timeout: 60s
      - assertion: log_not_contains
        pattern: "Error while reading config event stream"
        during: 10s
      # Added with the Configuration Classifier (config check feature). Default config values
      # must not trigger unsupported-key warnings.
      - assertion: log_not_contains
        pattern: "Unsupported configuration key"
        during: 10s
      - assertion: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
