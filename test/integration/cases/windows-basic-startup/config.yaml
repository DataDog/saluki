type: integration
name: "windows-basic-startup"
description: "Verifies ADP starts successfully and remains stable in a Windows container"
timeout: 120s
runtimes: [windows]

env:
  DD_API_KEY: "test-api-key"
  DD_HOSTNAME: "windows-integration-test"
  DD_DATA_PLANE_STANDALONE_MODE: "true"

container:
  image: "saluki-images/agent-data-plane:testing-windows"

assertions:
  - type: log_contains
    pattern: "Agent Data Plane starting"
    timeout: 10s
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
