type: integration
name: "privileged-api-endpoints"
description: "Verifies the logging and metrics override routes are exposed on the privileged API after the workers assert them dynamically."
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "test-api-key"
  DD_HOSTNAME: "integration-test-privileged-api"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "true"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"

container:
  exposed_ports:
    - "55101/tcp"

assertions:
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: port_listening
        port: 55101
        protocol: tcp
        timeout: 20s
      # Each of the four routes below is registered as POST-only by the corresponding override
      # worker. A GET request therefore returns 405 Method Not Allowed when the route is present;
      # if the worker failed to assert its DynamicRoute, the request would return 404 instead.
      # Asserting "status != 404" lets us verify route registration without exercising the routes.
      - type: http_check
        endpoint: "https://localhost:55101/logging/override"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 20s
      - type: http_check
        endpoint: "https://localhost:55101/logging/reset"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 20s
      - type: http_check
        endpoint: "https://localhost:55101/metrics/override"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 20s
      - type: http_check
        endpoint: "https://localhost:55101/metrics/reset"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 20s
      - type: http_check
        endpoint: "https://localhost:55101/config"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 20s
      - type: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
