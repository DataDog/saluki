type: integration
name: "otlp-traces-enabled"
description: "Verifies OTLP pipeline starts with native trace handling and proxying for metrics/logs"
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "test-api-key"
  DD_HOSTNAME: "integration-test-dsd"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "true"
  DD_DATA_PLANE_OTLP_ENABLED: "true"
  DD_DATA_PLANE_OTLP_PROXY_ENABLED: "true"
  DD_DATA_PLANE_OTLP_PROXY_TRACES_ENABLED: "false"

container:
  exposed_ports:
    - "54317/tcp"
    - "54318/tcp"

assertions:
  # Make sure the process becomes healthy, and stays up without errors, listening for OTLP (HTTP and gRPC),
  # for ~10 seconds after.
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: port_listening
        port: 54317
        protocol: tcp
        timeout: 10s
      - type: port_listening
        port: 54318
        protocol: tcp
        timeout: 10s
      - type: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
