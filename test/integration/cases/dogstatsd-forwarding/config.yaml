type: integration
name: "dogstatsd-forwarding"
description: "Verifies DogStatsD raw packet forwarding mirrors payload bytes and preserves ingestion"
timeout: 90s

container:
  image: "saluki-images/datadog-agent:testing-devel"
  entrypoint:
    - "/opt/datadog-agent/embedded/bin/python3"
    - "/forwarding-test/run_forwarding_test.py"
  env:
    DD_API_KEY: "test-api-key"
    DD_HOSTNAME: "integration-test-dsd-forwarding"
    DD_DATA_PLANE_ENABLED: "true"
    DD_DATA_PLANE_STANDALONE_MODE: "true"
    DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
    DD_DOGSTATSD_PORT: "8125"
    DD_DOGSTATSD_TCP_PORT: "9126"
    DD_DOGSTATSD_SOCKET: "/tmp/dsd-forwarding.sock"
    DD_DOGSTATSD_STREAM_SOCKET: "/tmp/dsd-forwarding-stream.sock"
    DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
    DD_STATSD_FORWARD_HOST: "127.0.0.1"
    DD_STATSD_FORWARD_PORT: "9125"
  files:
    - "run_forwarding_test.py:/forwarding-test/run_forwarding_test.py"
  exposed_ports:
    - "8125/udp"
    - "9126/tcp"

assertions:
  - type: log_contains
    pattern: "DogStatsD packet forwarding enabled"
    timeout: 15s
  - type: file_contains
    path: "/tmp/dsd-forwarded-packet"
    pattern: "adp.forwarding.integration:1|c|#source:integration"
    timeout: 30s
  - type: file_contains
    path: "/tmp/dsd-forwarded-malformed-packet"
    pattern: "this is not dogstatsd"
    timeout: 30s
  - type: file_contains
    path: "/tmp/dsd-forwarded-stream-packet"
    pattern: "adp.forwarding.stream_one:1|c\nadp.forwarding.stream_two:2|c\n"
    timeout: 30s
  - type: file_contains
    path: "/tmp/dsd-forwarded-uds-packet"
    pattern: "adp.forwarding.uds_datagram:1|c"
    timeout: 30s
  - type: file_contains
    path: "/tmp/dsd-forwarded-uds-stream-packet"
    pattern: "adp.forwarding.uds_stream:1|c\n"
    timeout: 30s
  - type: file_contains
    path: "/tmp/dsd-processing-seen"
    pattern: "component_packets_received_total"
    timeout: 30s
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: port_listening
        port: 8125
        protocol: udp
        timeout: 10s
      - type: port_listening
        port: 9126
        protocol: tcp
        timeout: 10s
      - type: log_not_contains
        pattern: "Unsupported configuration key|panic|PANIC"
        regex: true
        during: 10s
