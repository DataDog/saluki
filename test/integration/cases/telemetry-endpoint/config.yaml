type: integration
name: "telemetry-endpoint"
description: "Verifies the internal telemetry routes are exposed on the unprivileged API endpoint"
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-telemetry"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "false"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"

container:
  exposed_ports:
    - "55100/tcp"

procedure:
  # Make sure the process becomes healthy, and stays up without errors, with the telemetry routes
  # served on the unprivileged API endpoint.
  - parallel:
      - assertion: process_stable_for
        duration: 10s
      - assertion: port_listening
        port: 55100
        protocol: tcp
        timeout: 60s
      - assertion: http_check
        endpoint: "http://localhost:55100/metrics"
        status:
          equal: 200
        timeout: 60s
      - assertion: http_check
        endpoint: "http://localhost:55100/compat/metrics"
        status:
          equal: 200
        timeout: 60s
      - assertion: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
