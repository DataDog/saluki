type: integration
name: "adp-logging-windows-ignores-core-agent-log-file"
description: "Verifies ADP ignores the Core Agent's Windows log_file setting and uses its own per-subagent log file"
timeout: 120s
runtimes: [windows]

env:
  DD_API_KEY: "test-api-key"
  DD_HOSTNAME: "integration-test-windows-ignore-core-log"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_USE_NEW_CONFIG_STREAM_ENDPOINT: "true"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
  DD_LOG_FILE: "C:\\adp\\coreagent-only.log"
  DD_DATA_PLANE_LOG_FILE: "C:\\adp\\adp-ignores-core-agent-log-file.log"

container:
  exposed_ports:
    - "58125/udp"

procedure:
  - assertion: log_contains
    pattern: "Initial configuration received."
    timeout: 60s
  - assertion: file_contains
    path: "C:\\adp\\adp-ignores-core-agent-log-file.log"
    pattern: "DATAPLANE"
    timeout: 60s
  - assertion: file_contains
    path: "C:\\adp\\coreagent-only.log"
    pattern: "CORE"
    timeout: 60s
