# Verify the config check exits ADP when a high-severity incompatible key has a non-default value.
#
# `heroku_dyno` is set to a non-default value. This key controls Heroku-specific
# hostname behavior, which ADP doesn't implement.
#
# If `heroku_dyno` is implemented in the future, replace this key with another
# high-severity incompatible key, or delete this test if no suitable key remains.

type: integration
name: "adp-config-check-exit"
description: "Verify config check exits ADP on high-severity incompatible key"
timeout: 120s
runtimes: [docker, mac]
requires_core_agent: true

container:
  image: "saluki-images/datadog-agent:testing-devel"
  env:
    DD_API_KEY: "test-api-key"
    DD_HOSTNAME: "integration-test-config-exit"
    DD_DATA_PLANE_ENABLED: "true"
    DD_DATA_PLANE_STANDALONE_MODE: "false"
    DD_DATA_PLANE_USE_NEW_CONFIG_STREAM_ENDPOINT: "true"
    DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
    DD_HEROKU_DYNO: "true" # Incompatible(High) - triggers error and exit

assertions:
  - type: log_contains
    pattern: "Unsupported configuration key with non-default value"
    timeout: 30s
  - type: log_contains
    pattern: "incompatible configuration detected"
    timeout: 30s
  # Verify ADP actually exited (not just logged the error and continued). On docker this
  # observes the s6 supervisor's exit log; on mac it observes the process exit code
  # directly. Expected code is 1 because the high-severity check returns a non-zero status.
  - type: adp_exits_with
    expected_code: 1
    timeout: 30s
