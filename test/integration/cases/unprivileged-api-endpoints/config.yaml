type: integration
name: "unprivileged-api-endpoints"
description: "Verifies the /ready, /live, and /memory/status endpoints are accessible on the unprivileged API"
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-health"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "false"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"

container:
  exposed_ports:
    - "55100/tcp"

procedure:
  - parallel:
      - assertion: process_stable_for
        duration: 10s
      - assertion: http_check
        endpoint: "http://localhost:55100/ready"
        status:
          equal: 200
        timeout: 60s
      - assertion: http_check
        endpoint: "http://localhost:55100/live"
        status:
          equal: 200
        timeout: 60s
      - assertion: http_check
        endpoint: "http://localhost:55100/memory/status"
        status:
          equal: 200
        timeout: 60s
      - assertion: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
