type: integration
name: "adp-config-dynamic-basic"
description: "Verifies a Core Agent runtime config mutation propagates to ADP's /config endpoint."
timeout: 120s
runtimes: [linux, mac, windows]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-dynamic-config"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "false"
  DD_DATA_PLANE_USE_NEW_CONFIG_STREAM_ENDPOINT: "true"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
  DD_LOG_LEVEL: "info"

container:
  exposed_ports:
    - "55101/tcp"

assertions:
  - type: adp_config_key_equals
    key: log_level
    value: info
    timeout: 60s
  - action: core_agent_config_set
    key: log_level
    value: debug
  - type: adp_config_key_equals
    key: log_level
    value: debug
    timeout: 60s
  - parallel:
      - type: process_stable_for
        duration: 10s
      - type: log_not_contains
        pattern: "Error while reading config event stream"
        during: 10s
      - type: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
