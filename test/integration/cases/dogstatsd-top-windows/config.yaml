type: integration
name: "dogstatsd-top-windows"
description: "Verifies the authenticated DogStatsD top workflow and protected context artifact on Windows"
timeout: 180s
runtimes: [windows]

env:
  DD_API_KEY: "00000000000000000000000000000000"
  DD_HOSTNAME: "integration-test-dogstatsd-top-windows"
  DD_DATA_PLANE_ENABLED: "true"
  DD_DATA_PLANE_STANDALONE_MODE: "false"
  DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"

container:
  files:
    - "run_dogstatsd_top_test.ps1:C:\\adp\\run_dogstatsd_top_test.ps1"
  exposed_ports:
    - "58125/udp"
    - "55101/tcp"

procedure:
  - parallel:
      - assertion: port_listening
        port: 58125
        protocol: udp
        timeout: 60s
      - assertion: port_listening
        port: 55101
        protocol: tcp
        timeout: 60s
      # The route is POST-only. A GET returns 405 when registration is complete and 404 when absent.
      - assertion: http_check
        endpoint: "https://localhost:55101/agent/dogstatsd-contexts-dump"
        status:
          not_equal: 404
        insecure_skip_verify: true
        timeout: 60s
  - action: target_exec
    command:
      - "pwsh"
      - "-NoProfile"
      - "-NonInteractive"
      - "-File"
      - "C:\\adp\\run_dogstatsd_top_test.ps1"
    timeout: 90s
  - assertion: file_contains
    path: "C:\\dogstatsd-top-result"
    pattern: "passed"
    timeout: 10s
  - parallel:
      - assertion: process_stable_for
        duration: 10s
      - assertion: log_not_contains
        pattern: "panic|PANIC"
        regex: true
        during: 10s
