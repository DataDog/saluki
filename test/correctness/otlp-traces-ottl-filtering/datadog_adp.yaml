# OTLP correctness test configuration for Agent Data Plane (comparison).
# Same as otlp-traces plus OTTL span filtering so that baseline (OTel Collector) and
# comparison (ADP) apply the same predicates and produce comparable output.
hostname: "correctness-testing"

# Dummy API key.
api_key: dummy-api-key-correctness-testing

# We have to specifically configure the health port to use.
health_port: 5555

log_level: debug

# Disable process and container collection.
process_config:
  process_collection:
    enabled: false
  container_collection:
    enabled: false

# Point ourselves at the datadog-intake service at the global level.
dd_url: "http://datadog-intake:2049"

# Adjust our APM configuration to ensure we don't do any sampling of traces.
#
# We also have to set an APM-specific override here to send traces to the datadog-intake service.
apm_config:
  enabled: true
  apm_dd_url: "http://datadog-intake:2049"
  target_traces_per_second: 1000000
  features: ["enable_otlp_compute_top_level_by_span_kind"]

# OTTL span filtering: same predicates as in collector.yaml (baseline).
ottl_filter_config:
  error_mode: ignore
  traces:
    span:
      - 'attributes["container.name"] == "app_container_1"'
      - 'resource.attributes["deployment.environment"] == "production"'

# Enable OTLP receiver on gRPC port 4317
otlp_config:
  receiver:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
  traces:
    enable_otlp_compute_top_level_by_span_kind: true
