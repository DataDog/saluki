# OpenTelemetry Collector config for baseline: OTLP receiver, OTTL span filter (same
# predicates as ADP in datadog.yaml), Datadog exporter to datadog-intake.
# Aligns with datadog.yaml behaviour plus OTTL filtering for E2E comparison.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["container.name"] == "app_container_1"'
        - 'resource.attributes["host.name"] == "localhost"'

exporters:
  datadog:
    hostname: correctness-testing
    api:
      key: correctness-test
    traces:
      endpoint: http://datadog-intake:2049

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter]
      exporters: [datadog]
