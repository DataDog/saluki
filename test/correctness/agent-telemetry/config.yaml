type: correctness
runtime: docker
analysis_mode: agent_telemetry
# Longer flush wait so that the agenttelemetry component (start_after: 75 in datadog.yaml) fires
# well after all DogStatsD traffic has been fully aggregated and forwarded. The telemetry snapshot
# at t=75s captures a stable, deterministic view of point.sent and transaction counters.
flush_wait_secs: 90
millstone:
  image: saluki-images/correctness-tools:latest
  config_path: millstone.yaml
datadog_intake:
  image: saluki-images/correctness-tools:latest
  config_path: ../datadog-intake.yaml
baseline:
  image: saluki-images/datadog-agent:testing-release
  files:
    - datadog.yaml:/etc/datadog-agent/datadog.yaml
  additional_env_vars:
    - DD_API_KEY=correctness-test
comparison:
  image: saluki-images/datadog-agent:testing-release
  files:
    - datadog.yaml:/etc/datadog-agent/datadog.yaml
  additional_env_vars:
    - DD_API_KEY=correctness-test
    - DD_DATA_PLANE_ENABLED=true
    - DD_DATA_PLANE_STANDALONE_MODE=true
    - DD_DATA_PLANE_DOGSTATSD_ENABLED=true
    - DD_AGGREGATE_CONTEXT_LIMIT=500000
