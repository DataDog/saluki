# Using a fixed hostname is both required to avoid errors, and also will ensure consistent tags between DSD/ADP.
hostname: "correctness-testing"

# Dummy API key.
api_key: dummy-api-key-correctness-testing

# We have to specifically configure the health port to use.
health_port: 5555

# Point ourselves at the datadog-intake service.
dd_url: "http://datadog-intake:2049"

# Turn off UDP and listen on a UDS socket instead.
dogstatsd_port: 0
dogstatsd_socket: /airlock/metrics.sock

dogstatsd_origin_detection: false

# Gauges can be processed out-of-order when multiple workers are used, while ADP does not use multiple workers, so ADP
# always ends up with the correct (last seen) value, while DSD might return the last seen value... or the value seen
# four updates ago, etc etc.
dogstatsd_workers_count: 1

# The purpose of this test case: do DSD and ADP treat the three static-tag keys the same way? `tags` and `extra_tags`
# are concatenated by the core agent's hosttags helper and surface together via the host_tags response that ADP fetches
# over RemoteAgentClient. `dogstatsd_tags` is applied per-packet by the DSD source itself. Issues #1332 and #1333
tags:
  - correctness:tags
  - gato:simon
  - blue
  - dup:a
  - dup:b
extra_tags:
  - correctness:extra
  - parachute:graceful
  - market
  - dup:a
  - dup:c
dogstatsd_tags:
  - correctness:dsd
  - goat
  - mood
  - dup:b
  - dup:c

# Causes the agent to apply `tags` and `extra_tags` inline instead of relying on the backend to do it. Set to an
# arbitrary long duration that outlasts the test run, so every metric in the test contains those tags. Has no effect on
# `dogstatsd_tags`, which the DSD source applies per-packet regardless of duration.
expected_tags_duration: 1000m
