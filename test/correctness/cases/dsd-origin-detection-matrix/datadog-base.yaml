# Base agent configuration shared across all origin detection matrix variants.
#
# Origin detection settings (dogstatsd_origin_detection, origin_detection_unified, etc.) are
# intentionally absent here. Each matrix variant injects them via DD_* environment variables,
# which the agent and ADP both map to the corresponding config keys. This keeps the base file
# minimal and avoids conflicts with per-variant overrides.

# Using a fixed hostname is both required to avoid errors, and also will ensure consistent tags
# between DSD/ADP.
hostname: "correctness-testing"

# Dummy API key.
api_key: dummy-api-key-correctness-testing

# We have to specifically configure the health port to use.
health_port: 5555

# In a multi-container pod all containers share localhost, so we use localhost instead of the
# container name.
dd_url: "http://localhost:2049"

# Turn off UDP and listen on a UDS socket instead. All origin detection variants use UDS because
# SO_PASSCRED-based PID resolution only works on Unix domain sockets.
dogstatsd_port: 0
dogstatsd_socket: /airlock/metrics.sock

# Point both the core agent and ADP at the containerd socket mounted from the kind node. Without
# an explicit path here, both agents skip containerd detection when running inside Docker (inside
# a kind pod), because they detect the Docker runtime and bypass containerd auto-discovery. The
# containerd gRPC API resolves PIDs to container IDs directly, bypassing the cgroup path which is
# broken in this setup due to private cgroup namespaces.
cri_socket_path: /var/run/containerd/containerd.sock

# Gauges can be processed out-of-order when multiple workers are used, while ADP does not use
# multiple workers, so ADP always ends up with the correct (last seen) value, while DSD might
# return the last seen value... or the value seen four updates ago, etc etc.
dogstatsd_workers_count: 1

# Keep a large context limit on both baseline and comparison targets so high-cardinality matrix
# variants don't diverge due context eviction behavior under load.
aggregate_context_limit: 500000
