# Using a fixed hostname is both required to avoid errors, and also will ensure consistent tags between DSD/ADP.
hostname: "correctness-testing"

# Dummy API key.
api_key: dummy-api-key-correctness-testing

# We have to specifically configure the health port to use.
health_port: 5555

# In a multi-container pod all containers share localhost, so we use localhost instead of the container name.
dd_url: "http://localhost:2049"

# Turn off UDP and listen on a UDS socket instead.
dogstatsd_port: 0
dogstatsd_socket: /airlock/metrics.sock

# Enable origin detection. The kind cluster provides a real kubelet, so both DSD and ADP can resolve
# the millstone container's PID (via SO_PASSCRED on the UDS socket) to actual Kubernetes pod tags.
# This verifies that ADP enriches metrics with the same origin tags as baseline DSD.
dogstatsd_origin_detection: true

# Point both the core agent and ADP at the containerd socket mounted from the kind node. This is
# required because cgroup-based PID resolution is broken in this setup: the container's private
# cgroup namespace means /proc/<pid>/cgroup paths are namespace-relative and don't contain the
# container ID. The containerd gRPC API resolves PIDs to container IDs directly, bypassing cgroups.
#
# Without an explicit path here, both the core agent and ADP skip containerd detection entirely
# when they detect they are running inside Docker (which they are, inside a kind pod).
cri_socket_path: /var/run/containerd/containerd.sock

# Gauges can be processed out-of-order when multiple workers are used, while ADP does not use multiple workers, so ADP
# always ends up with the correct (last seen) value, while DSD might return the last seen value... or the value seen
# four updates ago, etc etc.
dogstatsd_workers_count: 1
