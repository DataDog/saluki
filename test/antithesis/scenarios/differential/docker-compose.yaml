name: saluki-differential

services:
  intake:
    container_name: intake
    hostname: intake
    platform: linux/amd64
    init: true
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/differential/Dockerfile
      target: intake
    image: intake-differential:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      DD_HOSTNAME: "antithesis-differential"
      AGENT_LISTEN_ADDR: "0.0.0.0:2049"
      ADP_LISTEN_ADDR: "0.0.0.0:2050"
      # Read on the first /contexts request to size the shared context pool.
      CONFIG_DIR: "/agent-config"
    volumes:
      - agent-config:/agent-config:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2049'"]
      interval: 2s
      timeout: 2s
      retries: 30

  # Reference lane: converged Datadog Agent with the data plane OFF. The Core
  # Agent's own DogStatsD server processes metrics. Ships to the agent intake
  # lane.
  datadog-agent:
    container_name: datadog-agent
    hostname: datadog-agent
    platform: linux/amd64
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/differential/Dockerfile
      target: datadog-agent
    image: datadog-agent-differential:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      DD_API_KEY: "antithesis-test-api-key"
      DD_DD_URL: "http://intake:2049"
      DD_HOSTNAME: "antithesis-differential"
      AGENT_CONFIG_DIR: "/agent-config"
      # Pin the reference lane data-plane-off explicitly, not by absence of the var.
      DD_DATA_PLANE_ENABLED: "false"
    volumes:
      - agent-dogstatsd-socket:/var/run/dogstatsd
      - agent-config:/agent-config:ro
    depends_on:
      intake:
        condition: service_healthy

  # Test lane: the same converged image with the data plane ON, so our embedded
  # instrumented ADP owns DogStatsD. Ships to the adp intake lane.
  adp:
    container_name: adp
    hostname: adp
    platform: linux/amd64
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/differential/Dockerfile
      target: datadog-agent
    image: datadog-agent-differential:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      DD_API_KEY: "antithesis-test-api-key"
      DD_DD_URL: "http://intake:2050"
      ADP_DD_DD_URL: "http://intake:2050"
      DD_HOSTNAME: "antithesis-differential"
      DD_DATA_PLANE_ENABLED: "true"
      DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
      AGENT_CONFIG_DIR: "/agent-config"
    volumes:
      - adp-dogstatsd-socket:/var/run/dogstatsd
      - agent-config:/agent-config:ro
    depends_on:
      intake:
        condition: service_healthy

  workload:
    container_name: workload
    hostname: workload
    platform: linux/amd64
    init: true
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/differential/Dockerfile
      target: workload-differential
    image: workload-differential:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      INTAKE_CONTROL_ADDR: "intake:2049"
      AGENT_DOGSTATSD_SOCKET: "/var/run/datadog-agent/dsd.socket"
      ADP_DOGSTATSD_SOCKET: "/var/run/adp/dsd.socket"
      DOGSTATSD_SOCKET: "/var/run/dogstatsd/dsd.socket"
      DD_HOSTNAME: "antithesis-differential"
    volumes:
      - agent-dogstatsd-socket:/var/run/datadog-agent
      - adp-dogstatsd-socket:/var/run/adp
      - agent-config:/agent-config
    depends_on:
      intake:
        condition: service_healthy

volumes:
  agent-dogstatsd-socket:
  adp-dogstatsd-socket:
  agent-config:
