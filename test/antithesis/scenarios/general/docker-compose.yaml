name: saluki

services:
  intake:
    container_name: intake
    hostname: intake
    platform: linux/amd64
    init: true
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/general/Dockerfile
      target: intake
    image: intake:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
    healthcheck:
      # antithesis-intake serves HTTP on :2049. /dev/tcp avoids needing curl in the image.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2049'"]
      interval: 2s
      timeout: 2s
      retries: 30

  # Single SUT: converged Datadog Agent with the data plane ON, so the embedded
  # instrumented ADP owns DogStatsD. The workload points the liveness check at
  # `agent` via ADP_API_ADDR.
  agent:
    container_name: agent
    hostname: agent
    platform: linux/amd64
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/general/Dockerfile
      target: datadog-agent
    image: datadog-agent:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      DD_API_KEY: "antithesis-test-api-key"
      DD_DD_URL: "http://intake:2049"
      ADP_DD_DD_URL: "http://intake:2049"
      DD_HOSTNAME: "antithesis-adp"
      DD_DATA_PLANE_ENABLED: "true"
      DD_DATA_PLANE_DOGSTATSD_ENABLED: "true"
      AGENT_CONFIG_DIR: "/agent-config"
    volumes:
      - dogstatsd-socket:/var/run/datadog
      # first_sample_config (workload) writes this timeline's datadog.yaml + ready sentinel here.
      - agent-config:/agent-config:ro
    depends_on:
      intake:
        condition: service_healthy

  workload:
    container_name: workload
    hostname: workload
    platform: linux/amd64
    init: true
    build:
      context: ../../../..
      dockerfile: test/antithesis/scenarios/general/Dockerfile
      target: workload
    image: workload:${ANTITHESIS_IMAGE_TAG:-latest}
    environment:
      NO_COLOR: "1"
      ADP_DOGSTATSD_SOCKET: "/var/run/datadog/dsd.socket"
      INTAKE_ADDR: "intake:2049"
      ADP_API_ADDR: "agent:5100"
    volumes:
      - dogstatsd-socket:/var/run/datadog
      - agent-config:/agent-config
    depends_on:
      intake:
        condition: service_healthy

volumes:
  dogstatsd-socket:
  agent-config:
