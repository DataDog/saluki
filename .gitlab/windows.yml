.windows-amd64-test-job:
  tags: ["windows-v2:2022"]
  interruptible: true
  variables:
    ARCH: "x64"
    # Keep this pinned while the job is experimental. This mirrors the current Datadog Agent Windows LTSC2022 build image.
    WINBUILDIMAGE: registry.ddbuild.io/ci/datadog-agent-buildimages/windows_ltsc2022_x64:v110159745-8628883e
    OVERRIDE_GIT_STRATEGY: "clone"
    AWS_SHARED_CREDENTIALS_FILE: '${CI_PROJECT_DIR}\.aws\credentials-by-job-id\${CI_JOB_ID}'
  before_script:
    - C:\ci-identities-gitlab-job-client.exe assume-role
  id_tokens:
    CI_IDENTITIES_GITLAB_ID_TOKEN:
      aud: ci-identities

unit-tests-windows-amd64:
  extends: .windows-amd64-test-job
  stage: test
  allow_failure: true
  # Windows runner capacity is limited, so keep this opt-in/manual until the job is stable enough for the critical path.
  rules:
    - if: '$RUN_WINDOWS_UNIT_TESTS == "true"'
      when: on_success
    - when: manual
      allow_failure: true
  cache:
    key: windows-amd64-cargo
    paths:
      - .ci-cache/cargo/
      - .ci-cache/rustup/
  script:
    - $ErrorActionPreference = "Stop"
    - docker pull ${WINBUILDIMAGE}
    - >
      docker run --rm
      -m 24576M
      --storage-opt "size=50GB"
      -v "$(Get-Location):c:\mnt"
      -w c:\mnt
      -e CI=true
      -e GITLAB_CI
      -e CI_JOB_ID
      -e CI_PIPELINE_ID
      -e CI_COMMIT_SHA
      -e CI_PROJECT_NAME
      -e CI_COMMIT_REF_NAME
      -e CI_IDENTITIES_GITLAB_ID_TOKEN
      -e CARGO_HOME="c:\mnt\.ci-cache\cargo"
      -e RUSTUP_HOME="c:\mnt\.ci-cache\rustup"
      -e CARGO_TARGET_DIR="c:\mnt\target\windows-ci"
      -e CARGO_NEXTEST_VERSION="0.9.99"
      -e WINDOWS_CI_PACKAGES="datadog-agent-commons,process-memory,saluki-error,ddsketch,prometheus-exposition,saluki-config"
      ${WINBUILDIMAGE}
      powershell.exe -NoProfile -NonInteractive -File c:\mnt\ci\tooling\windows-unit-tests.ps1
    - If ($lastExitCode -ne "0") { exit "$lastExitCode" }
