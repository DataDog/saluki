build-correctness-tools-image:
  stage: e2e
  image: ${DOCKER_BUILD_IMAGE}
  needs: []
  retry: 2
  timeout: 10m
  script:
    - docker buildx build
      --platform linux/amd64
      --file ./docker/Dockerfile.correctness-tools
      --tag ${SALUKI_IMAGE_REPO_BASE}/correctness-tools:${CI_COMMIT_SHA}
      --build-arg BUILD_IMAGE=${PUBLIC_BASE_IMAGE}
      --build-arg APP_IMAGE=${PUBLIC_BASE_IMAGE}
      --label git.repository=${CI_PROJECT_NAME}
      --label git.branch=${CI_COMMIT_REF_NAME}
      --label git.commit=${CI_COMMIT_SHA}
      --label ci.pipeline_id=${CI_PIPELINE_ID}
      --label ci.job_id=${CI_JOB_ID}
      --push
      .

build-bundled-agent-adp-image:
  stage: e2e
  image: ${DOCKER_BUILD_IMAGE}
  needs:
    - build-adp-image
  retry: 2
  timeout: 10m
  script:
    - docker buildx build
      --platform linux/amd64
      --file ./docker/Dockerfile.datadog-agent
      --tag ${SALUKI_IMAGE_REPO_BASE}/bundled-agent-adp:${CI_COMMIT_SHA}
      --build-arg DD_AGENT_VERSION=${PUBLIC_DD_AGENT_VERSION}
      --build-arg ADP_IMAGE=${ADP_FULL_IMAGE_TAG}
      --build-arg BUILD_PROFILE=release
      --label git.repository=${CI_PROJECT_NAME}
      --label git.branch=${CI_COMMIT_REF_NAME}
      --label git.commit=${CI_COMMIT_SHA}
      --label ci.pipeline_id=${CI_PIPELINE_ID}
      --label ci.job_id=${CI_JOB_ID}
      --push
      .

# Compile panoramic once. The dynamically generated child pipeline below
# pulls this artifact instead of rebuilding per test.
build-panoramic-binary:
  extends: .build-common-variables
  stage: e2e
  tags: ["arch:amd64"]
  needs: []
  retry: 2
  timeout: 30m
  image: "${SALUKI_BUILD_CI_IMAGE}"
  artifacts:
    expire_in: 1 day
    paths: [target/release/panoramic]
  script:
    - make build-panoramic

# Scan test/correctness/cases/ and emit a child-pipeline YAML with one job per test
# directory. Each emitted job extends mixins from .gitlab/correctness-mixins.yml.
generate-correctness-pipeline:
  stage: e2e
  image: "${SALUKI_BUILD_CI_IMAGE}"
  needs:
    - build-bundled-agent-adp-image
    - build-correctness-tools-image
    - build-panoramic-binary
  script:
    - bash ci/tooling/generate-correctness-pipeline.sh > generated-correctness.yml
  artifacts:
    paths: [generated-correctness.yml]

# Run the generated child pipeline.
run-correctness-tests:
  stage: e2e
  needs:
    - generate-correctness-pipeline
  variables:
    # Child pipelines inherit the parent's global YAML variables by default,
    # so SALUKI_* are already available. PARENT_PIPELINE_ID is renamed from
    # CI_PIPELINE_ID so the child's `needs:[pipeline: ..., job: ...]` can
    # reference the parent pipeline (in the child, $CI_PIPELINE_ID is its own).
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
  trigger:
    include:
      # this is the file we generated in the previous step
      - artifact: generated-correctness.yml
        job: generate-correctness-pipeline
    # folds child status into the parent
    strategy: depend

test-integration:
  stage: e2e
  tags: ["docker-in-docker:amd64"]
  needs:
    - build-bundled-agent-adp-image
  retry: 2
  timeout: 10m
  image: "${SALUKI_BUILD_CI_IMAGE}"
  artifacts:
    expire_in: 1 week
    paths:
      - integration-logs/
    when: always
  variables:
    # Looks weird but we need to set this so that the test runner knows the right image path to pull the `alpine` image, which is required by
    # `airlock` to properly configure some permissions on the shared volume before the target container is started. We don't have access to
    # Docker Hub so the default of `alpine:latest` is insufficient.
    PANORAMIC_ALPINE_IMAGE: registry.ddbuild.io/alpine:latest
    PANORAMIC_LOG_DIR: integration-logs
  script:
    # Copy the bundled Agent/ADP image we built to the local Docker instance so we can share the integration
    # test configurations between CI and local test runs.
    - docker pull ${SALUKI_IMAGE_REPO_BASE}/bundled-agent-adp:${CI_COMMIT_SHA}
    - docker tag ${SALUKI_IMAGE_REPO_BASE}/bundled-agent-adp:${CI_COMMIT_SHA} saluki-images/datadog-agent:testing-devel
    - make test-integration-quick

# Runs the subset of integration tests that have opted in to the `mac` runtime
# directly on a bare-metal macOS runner. No Docker, no virtualization: panoramic spawns ADP
# (and the Core Agent for converged tests) as real macOS processes against a per-test temp
# state directory. The Datadog Agent is installed into a sandbox under /tmp/saluki-dda by
# the Makefile target (idempotent: re-uses the install across runs if the pinned version is
# already present). The sandbox install never touches /opt/datadog-agent, so any system
# install on the runner is left alone.
.test-integration-macos-base:
  stage: e2e
  needs: []
  retry: 2
  timeout: 30m
  artifacts:
    expire_in: 1 week
    paths:
      - integration-logs/
    when: always
  variables:
    PANORAMIC_LOG_DIR: integration-logs
  before_script:
    # Defensive: clean up any leftover Agent/ADP processes from prior runs on this shared
    # runner. All test-Agent ports are shifted out of the canonical range (see
    # panoramic::unix_runner::test_port_isolation_env), so we don't need to touch a system
    # install at /opt/datadog-agent. We do need to sweep:
    #   - our own Core Agent sandbox under /tmp/saluki-dda (trace-agent / process-agent
    #     children that survived a non-graceful job termination still hold our shifted ports)
    #   - any stranded agent-data-plane process from a prior pipeline (built into
    #     $CI_PROJECT_DIR/target/release/, holds UDP 58125 / TCP 5100–5102 etc. across runs)
    - sudo pkill -9 -f /tmp/saluki-dda/ || true
    - sudo pkill -9 -f /target/release/agent-data-plane || true
  script:
    - make test-integration-macos-ci

test-integration-macos-arm64:
  extends:
    - .macos-arm64-test-job
    - .test-integration-macos-base

test-integration-macos-amd64:
  extends:
    - .macos-amd64-test-job
    - .test-integration-macos-base
