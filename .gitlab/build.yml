.build-adp-definition:
  stage: build
  image: ${SALUKI_GENERAL_CI_IMAGE}
  needs:
    - calculate-build-metadata
  retry: 2
  timeout: 15m
  variables:
    APP_BUILD_TIME: ${CI_PIPELINE_CREATED_AT}
    DDCI_CONFIGURE_OTEL_EXPORTER: true
    # Configure `buildcache` to use our shared cache bucket.
    BUILDCACHE_S3_BUCKET: "dd-saluki-build-cache-us1-ddbuild-io"
    BUILDCACHE_S3_REGION: "us-east-1"
  script:
    - docker buildx create --name adp-builder --driver docker-container --use
    - echo "Acquiring temporary AWS credentials..."
    - ci/tooling/get-temporary-aws-credentials.sh
    - 'echo "Building ADP image. (version: ${ADP_IMAGE_VERSION}, target: ${BUILD_TARGET}, profile: ${BUILD_PROFILE})"'
    - docker buildx build
      --file ./docker/Dockerfile.agent-data-plane
      --output push-by-digest=true,type=image,push=true
      --metadata-file ./build-metadata.${BUILD_ARCH}
      --tag ${ADP_IMAGE_REPO_BASE}
      --build-arg BUILDCACHE_IMAGE=${SALUKI_BUILDCACHE_CI_IMAGE}
      --build-arg BUILDCACHE_REMOTE=s3://s3.${BUILDCACHE_S3_REGION}.amazonaws.com/${BUILDCACHE_S3_BUCKET}
      --build-arg BUILD_IMAGE=${ADP_BUILD_IMAGE}
      --build-arg BUILD_BASE=build-prepped
      --build-arg LICENSE_IMAGE=${SALUKI_SPDX_LICENSES_CI_IMAGE}
      --build-arg LICENSE_BASE=license-prepped
      --build-arg PROFILING_IMAGE=${APP_IMAGE}
      --build-arg APP_IMAGE=${APP_IMAGE}
      --build-arg BUILD_PROFILE=${BUILD_PROFILE}
      --build-arg BUILD_FEATURES=${BUILD_FEATURES}
      --build-arg BUILD_TARGET=${BUILD_TARGET}
      --build-arg BUILD_CFLAGS=${BUILD_CFLAGS}
      --build-arg APP_FULL_NAME="${APP_FULL_NAME}"
      --build-arg APP_SHORT_NAME=${APP_SHORT_NAME}
      --build-arg APP_IDENTIFIER=${APP_IDENTIFIER}
      --build-arg APP_VERSION=${APP_VERSION}
      --build-arg APP_GIT_HASH=${APP_GIT_HASH}
      --build-arg APP_BUILD_TIME=${APP_BUILD_TIME}
      --build-arg APP_DEV_BUILD=${APP_DEV_BUILD}
      --label "org.opencontainers.image.authors=Datadog <package@datadoghq.com>"
      --label "org.opencontainers.image.base.name=${APP_IMAGE}"
      --label "org.opencontainers.image.created=${CI_PIPELINE_CREATED_AT}"
      --label "org.opencontainers.image.ref.name=agent-data-plane"
      --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}"
      --label "org.opencontainers.image.source=https://github.com/DataDog/saluki"
      --label "org.opencontainers.image.title=Agent Data Plane"
      --label "org.opencontainers.image.vendor=Datadog, Inc."
      --label "org.opencontainers.image.version=${ADP_IMAGE_VERSION}"
      --secret id=aws-creds,src=/tmp/temporary-aws-credentials.sh
      --push
      .
  artifacts:
    paths:
      - build-metadata.*

.build-adp-multi-arch-definition:
  stage: build
  image: ${SALUKI_GENERAL_CI_IMAGE}
  script:
    # Collect the manifest list digests for our AMD64 and ARM64 images, and then build a multi-arch manifest from them.
    - export AMD64_DIGEST=$(jq -r '."containerimage.digest"' build-metadata.amd64)
    - export ARM64_DIGEST=$(jq -r '."containerimage.digest"' build-metadata.arm64)
    - docker buildx imagetools create --tag ${IMAGE_TAG}
      ${ADP_IMAGE_REPO_BASE}@${AMD64_DIGEST}
      ${ADP_IMAGE_REPO_BASE}@${ARM64_DIGEST}

calculate-build-metadata:
  stage: build
  image: ${SALUKI_BUILD_CI_IMAGE}
  needs: []
  script:
    - make emit-adp-build-metadata >> build.env
  artifacts:
    reports:
      dotenv: build.env

build-adp-image-amd64:
  extends: [.build-common-variables, .build-amd64-variables, .build-adp-definition]
  tags: ["docker-in-docker:amd64"]
  variables:
    APP_IMAGE: ${ADP_PUBLIC_BASE_IMAGE}

build-adp-image-arm64:
  extends: [.build-common-variables, .build-arm64-variables, .build-adp-definition]
  tags: ["docker-in-docker:arm64"]
  variables:
    APP_IMAGE: ${ADP_PUBLIC_BASE_IMAGE}

build-adp-image:
  extends: [.build-common-variables, .build-adp-multi-arch-definition]
  needs:
    - build-adp-image-amd64
    - build-adp-image-arm64
  variables:
    IMAGE_TAG: ${ADP_FULL_IMAGE_TAG}

build-adp-image-fips-amd64:
  extends: [.build-common-variables, .build-amd64-variables, .build-adp-definition]
  tags: ["docker-in-docker:amd64"]
  variables:
    APP_IMAGE: ${ADP_PUBLIC_BASE_IMAGE}
    BUILD_FEATURES: "fips"

build-adp-image-fips-arm64:
  extends: [.build-common-variables, .build-arm64-variables, .build-adp-definition]
  tags: ["docker-in-docker:arm64"]
  variables:
    APP_IMAGE: ${ADP_PUBLIC_BASE_IMAGE}
    BUILD_FEATURES: "fips"

build-adp-image-fips:
  extends: [.build-common-variables, .build-adp-multi-arch-definition]
  needs:
    - build-adp-image-fips-amd64
    - build-adp-image-fips-arm64
  variables:
    IMAGE_TAG: ${ADP_FULL_IMAGE_TAG_FIPS}

# Internal-specific build variants that use a GBI-compliant base image.
build-adp-image-internal-amd64:
  extends: [.build-common-variables, .build-amd64-variables, .build-adp-definition]
  tags: ["docker-in-docker:amd64"]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - if: !reference [.on_official_release, rules, if]
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    APP_IMAGE: ${ADP_INTERNAL_BASE_IMAGE}

build-adp-image-internal-arm64:
  extends: [.build-common-variables, .build-arm64-variables, .build-adp-definition]
  tags: ["docker-in-docker:arm64"]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - if: !reference [.on_official_release, rules, if]
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    APP_IMAGE: ${ADP_INTERNAL_BASE_IMAGE}

build-adp-image-internal:
  extends: [.build-common-variables, .build-adp-multi-arch-definition]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - when: on_success
      needs:
        - build-adp-image-internal-amd64
        - build-adp-image-internal-arm64
  variables:
    IMAGE_TAG: ${ADP_FULL_IMAGE_TAG}-internal

build-adp-image-fips-internal-amd64:
  extends: [.build-common-variables, .build-amd64-variables, .build-adp-definition]
  tags: ["docker-in-docker:amd64"]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - if: !reference [.on_official_release, rules, if]
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    APP_IMAGE: ${ADP_INTERNAL_BASE_IMAGE}
    BUILD_FEATURES: "fips"

build-adp-image-fips-internal-arm64:
  extends: [.build-common-variables, .build-arm64-variables, .build-adp-definition]
  tags: ["docker-in-docker:arm64"]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - if: !reference [.on_official_release, rules, if]
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    APP_IMAGE: ${ADP_INTERNAL_BASE_IMAGE}
    BUILD_FEATURES: "fips"

build-adp-image-fips-internal:
  extends: [.build-common-variables, .build-adp-multi-arch-definition]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - when: on_success
      needs:
        - build-adp-image-fips-internal-amd64
        - build-adp-image-fips-internal-arm64
  variables:
    IMAGE_TAG: ${ADP_FULL_IMAGE_TAG_FIPS}-internal

# Finally, we publish our internal images after running through a small build process to add some necessary tooling
# required for the images to be deployed/used internally.
#
# These takes them from the sort of temporary holding ground of `registry.ddbuild.io/saluki/agent-data-plane`, adds the
# necessary pieces, and then publishes them to `registry.ddbuild.io/agent-data-plane` as a first-class citizen.
#
# We specifically duplicate our `ADP_INTERNAL_IMAGE_TAG` (and FIPS-specific variant) tag and construct the same value
# manually because otherwise, the variable is evaluated in the downstream job, leading to the wrong values being
# substituted.
publish-adp-image-internal:
  stage: build
  extends: [.build-common-variables]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - when: on_success
      needs:
        - build-adp-image-internal
  trigger:
    project: DataDog/images
    branch: master
    strategy: depend
  variables:
    IMAGE_NAME: agent-data-plane
    IMAGE_VERSION: tmpl-v5
    TMPL_SRC_REPO: ${ADP_IMAGE_REPO_NAME}
    TMPL_SRC_IMAGE: ${ADP_IMAGE_VERSION}-internal
    RELEASE_TAG: ${ADP_IMAGE_VERSION}
    BUILD_TAG: "${ADP_IMAGE_VERSION}-build"
    RELEASE_STAGING: "true"
    RELEASE_PROD: "true"
    ENABLE_NYDUS_PREVIEW: "true"

publish-adp-image-internal-fips:
  stage: build
  extends: [.build-common-variables]
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - when: on_success
      needs:
        - build-adp-image-fips-internal
  trigger:
    project: DataDog/images
    branch: master
    strategy: depend
  variables:
    IMAGE_NAME: agent-data-plane
    IMAGE_VERSION: tmpl-v5
    TMPL_SRC_REPO: ${ADP_IMAGE_REPO_NAME}
    TMPL_SRC_IMAGE: ${ADP_IMAGE_VERSION_FIPS}-internal
    RELEASE_TAG: ${ADP_IMAGE_VERSION_FIPS}
    BUILD_TAG: "${ADP_IMAGE_VERSION_FIPS}-build"
    RELEASE_STAGING: "true"
    RELEASE_PROD: "true"
    ENABLE_NYDUS_PREVIEW: "true"

display-image-tags:
  extends: [.build-common-variables]
  stage: build
  rules:
    - if: !reference [.on_mq_branch, rules, if]
      when: never
    - when: on_success
      needs:
        - build-adp-image-internal
        - build-adp-image-fips-internal
        - publish-adp-image-internal
        - publish-adp-image-internal-fips
  script:
    - |-
      cat <<EOF
      # Image Tags

      ## Agent Data Plane (suitable for internal deployments, GBI-based)
      Non-FIPS: ${IMAGE_REGISTRY}/${ADP_IMAGE_TAG}
      FIPS:     ${IMAGE_REGISTRY}/${ADP_IMAGE_TAG_FIPS}

      ## Agent Data Plane (suitable for internal deployments, GBI-based, Nydus-compatible)
      Non-FIPS: ${IMAGE_REGISTRY}/${ADP_IMAGE_TAG}-nydus
      FIPS:     ${IMAGE_REGISTRY}/${ADP_IMAGE_TAG_FIPS}-nydus
      EOF

# Builds the darwin release tarball (binary + LICENSES + LICENSE-3rdparty.csv + NOTICE) natively
# on a macOS runner and exposes it as a GitLab job artifact. The release-stage `push-release-
# tarball-darwin-*` jobs in `.gitlab/release.yml` consume this artifact and `aws s3 cp` it to
# the canonical bucket; splitting the work this way:
#
#   - lets us validate the darwin build end-to-end on PR pipelines (manual click on dev pipelines,
#     no S3 upload) without waiting for a tagged release to discover packaging breakage,
#   - keeps macOS runner usage limited to the build itself (the S3 upload runs in the Linux build
#     image just like the linux push jobs, with the same IAM-role credential model that's already
#     known to work),
#   - parallels the linux flow at a high level: `build-adp-image-*` always produces an artifact
#     (a docker image in registry.ddbuild.io) which the tagged release job consumes; here
#     `build-release-tarball-darwin-*` always produces a tarball artifact which the tagged
#     release job consumes.
#
# The output tarball layout (opt/datadog-agent/embedded/bin/agent-data-plane plus
# opt/datadog/agent-data-plane/{LICENSES,*}) matches the Linux artifact bit-for-bit so downstream
# consumers (the Datadog Agent omnibus build, see
# omnibus/config/software/datadog-agent-data-plane.rb in DataDog/datadog-agent) can use the same
# software definition for both platforms. FIPS-on-darwin is intentionally out of scope.
.build-release-tarball-darwin-definition:
  stage: build
  needs:
    - calculate-build-metadata
  rules:
    # On tagged release pipelines, run automatically so the artifact is ready when a maintainer
    # clicks the manual `push-release-tarball-darwin-*` job in the release stage.
    - if: !reference [.on_official_release, rules, if]
      when: on_success
    # On every other pipeline, gate behind a manual click so we don't burn macOS runner capacity
    # by default but still let anyone validate a PR's darwin tarball with one click.
    - when: manual
      allow_failure: true
  variables:
    # Filename produced by `make package-adp-host` (see ci/tooling/package-adp-tarball.sh). Kept
    # here so the artifacts: path below can reference it without re-deriving. BUILD_PROFILE
    # itself is inherited from the workflow `variables:` in .gitlab-ci.yml (`release` for dev
    # pipelines, `optimized-release` for tagged releases) just like the linux build jobs above
    # do; redeclaring it here as `BUILD_PROFILE: ${BUILD_PROFILE}` would self-reference and
    # blow up make with "Recursive variable BUILD_PROFILE references itself".
    TARBALL_NAME: "agent-data-plane-${ADP_IMAGE_VERSION}-darwin-${TARGET_ARCH}.tar.gz"
  script:
    # All the real work — cargo build, SPDX license harvest, tarball assembly, sha256 — lives in
    # `make package-adp-host` -> ci/tooling/package-adp-tarball.sh so it stays locally
    # reproducible (`make package-adp-host` on a Mac dev machine produces the same artifact this
    # job uploads). The Makefile target derives ADP_VERSION, TARGET_OS, TARGET_ARCH, etc. from
    # project state and pinned defaults.
    - make package-adp-host
    - cp target/release-tarball/${TARBALL_NAME} ${CI_PROJECT_DIR}/${TARBALL_NAME}
  artifacts:
    paths:
      - ${TARBALL_NAME}
    expire_in: 1 week

# Mirrors the linux `.build-adp-definition` `needs:` exactly: only `calculate-build-metadata`,
# so the build can run in parallel with the test stage. Test correctness is gated at
# release-time by `push-release-tarball-darwin-*` (in .gitlab/release.yml), which is the same
# place the linux push gates on tests. Cargo's own compile failure already surfaces as a
# failed build job — there's no value in additionally requiring unit-tests to pass first.
build-release-tarball-darwin-amd64:
  extends: [.macos-amd64-test-job, .build-release-tarball-darwin-definition]
  variables:
    TARGET_ARCH: "amd64"

build-release-tarball-darwin-arm64:
  extends: [.macos-arm64-test-job, .build-release-tarball-darwin-definition]
  variables:
    TARGET_ARCH: "arm64"
