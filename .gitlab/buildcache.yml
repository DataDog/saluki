# Builds Agent Data Plane in Docker with buildcache enabled, exercising the full
# compile → S3 round trip. This is a validation job for the buildcache integration, not a
# replacement for the main ADP build jobs in `.gitlab/build.yml`.
#
# Requires the buildcache-ci image to already exist at ${SALUKI_BUILDCACHE_CI_IMAGE} —
# produced by the manual `generate-buildcache-ci-image` job in `.gitlab/internal.yml`.
# Trigger that job once before expecting this one to pass; the image will then be pinned
# into `.gitlab-ci.yml` at an immutable tag.

build-adp-with-buildcache:
  image: "${SALUKI_SMP_CI_IMAGE}"
  stage: test
  tags: ["docker-in-docker:amd64"]
  timeout: 45m
  # Opt-in: clicked manually from the pipeline UI. `allow_failure: true` keeps the rest of the
  # pipeline from being gated on someone pressing the button.
  rules:
    - when: manual
      allow_failure: true
  variables:
    BUILDCACHE_S3_BUCKET: "dd-saluki-build-cache-us1-ddbuild-io"
    BUILDCACHE_S3_REGION: "us-east-1"
    KUBERNETES_CPU_REQUEST: "16"
    KUBERNETES_MEMORY_REQUEST: "16Gi"
    KUBERNETES_MEMORY_LIMIT: "24Gi"
  script:
    # Grab AWS temp credentials from the runner's IAM role and write them to /tmp/buildcache-aws-env.sh.
    # That file is fed to the BuildKit build below as a secret so buildcache inside the container can
    # read AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN at cargo-build time without
    # those values ever landing in an image layer.
    - ./test/buildcache/configure-buildcache-s3.sh
    - docker buildx create --name adp-buildcache-builder --driver docker-container --use
    - docker buildx build
        --file ./docker/Dockerfile.agent-data-plane
        --build-arg BUILD_IMAGE=${PUBLIC_BASE_IMAGE}
        --build-arg APP_IMAGE=${PUBLIC_BASE_IMAGE}
        --build-arg BUILDCACHE_IMAGE=${SALUKI_BUILDCACHE_CI_IMAGE}
        --build-arg BUILDCACHE_REMOTE=s3://s3.${BUILDCACHE_S3_REGION}.amazonaws.com/${BUILDCACHE_S3_BUCKET}
        --build-arg BUILDCACHE_DEBUG=1
        --build-arg BUILD_PROFILE=release
        --build-arg BUILD_TARGET=x86_64-unknown-linux-musl
        --secret id=buildcache-aws-env,src=/tmp/buildcache-aws-env.sh
        .
